<!DOCTYPE html>
<html>
<head>
    <title>PCA Visualization Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>PCA Visualization Test</h1>
    <button onclick="testPCA()">Test PCA API</button>
    <div id="result"></div>
    
    <script>
        async function testPCA() {
            try {
                const response = await axios.post('http://localhost:8000/api/pca-visualization', {
                    text: 'Python developer with React and AWS skills'
                });
                console.log('PCA Response:', response.data);
                document.getElementById('result').innerHTML = `
                    <h3>Success!</h3>
                    <p>Data points: ${response.data.data.length}</p>
                    <p>User point: ${response.data.data.find(p => p.is_user) ? 'Found' : 'Not found'}</p>
                    <pre>${JSON.stringify(response.data.data.slice(0, 3), null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
